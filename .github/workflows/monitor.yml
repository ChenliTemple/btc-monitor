name: BTC Monitor

on:
  schedule:
    # 每5分钟运行一次 (GitHub Actions 最短间隔)
    - cron: "*/5 * * * *"
  # 支持手动触发
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Setup config
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          cp config.example.yaml config.yaml
          sed -i "s|YOUR_FEISHU_WEBHOOK_URL|${FEISHU_WEBHOOK}|g" config.yaml

      - name: Check signal
        run: node check_once.js

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
